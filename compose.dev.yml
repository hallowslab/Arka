services:
  rabbitmq:
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
  postgres:
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
  arka:
    build:
      context: .
      target: development
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
    environment:
      - DJANGO_ENV=development
      - ARKA_LOGDIR=${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - STATIC_ROOT=/var/www/static
      - ENABLED_APPS=${ENABLED_APPS:-""}
      - CONTAINER_USER=root
    volumes:
      - shared_logs_dev:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - static_root_dev:/var/www/static
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    ports:
      - "8000:8000"
    command: /app/scripts/django_init.sh

  forj:
    build:
      context: .
      target: development
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
        CELERY_POOL: ${CELERY_POOL:-solo}
    environment:
      - DJANGO_ENV=development
      - CELERY_POOL=${CELERY_POOL:-solo}
      - ARKA_LOGDIR=${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - CONTAINER_USER=root
    volumes:
      - shared_logs_dev:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: /app/scripts/celery_init.sh worker

  forj-imapsync:
    build:
      context: .
      target: development
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
        CELERY_POOL: ${CELERY_POOL:-solo}
    environment:
      - DJANGO_ENV=development
      - CELERY_POOL=${CELERY_POOL:-solo}
      - ARKA_LOGDIR=${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - CONTAINER_USER=root
    volumes:
      - shared_logs_dev:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: /app/scripts/celery_init.sh worker imapsync

  forj-scheduler:
    build:
      context: .
      target: development
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
        CELERY_POOL: ${CELERY_POOL:-solo}
    environment:
      - DJANGO_ENV=development
      - CELERY_POOL=${CELERY_POOL:-solo}
      - ARKA_LOGDIR=${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - CONTAINER_USER=root
    volumes:
      - shared_logs_dev:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: /app/scripts/celery_init.sh beat

volumes:
  pgdata_dev:
  static_root_dev:
  rabbitmq_data_dev:
  shared_logs_dev:
