services:
  rabbitmq:
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
  postgres:
    volumes:
      - pgdata_dev:/var/lib/postgresql
  arka:
    volumes:
      - shared_logs_dev:$ARKA_LOGDIR
      - static_root_dev:$STATIC_ROOT
      - ./src/arka:/home/arka/app/arka/
      - ./src/templates:/home/arka/app/templates
      - ./src/static:/home/arka/app/static
      - ./src/forj:/home/arka/app/forj/
      - ./src/modular_apps:/home/arka/app/modular_apps/
    command: bash -c '/home/arka/app/init.sh & tail -f /dev/null'
    # command: tail -f /dev/null

  forj:
    volumes:
      - shared_logs_dev:$ARKA_LOGDIR
      - static_root_dev:$STATIC_ROOT
      - ./src/arka:/home/forj/app/arka/
      - ./src/templates:/home/forj/app/templates
      - ./src/static:/home/forj/app/static
      - ./src/forj:/home/forj/app/forj/
      - ./src/modular_apps:/home/forj/app/modular_apps/
    # command: /home/forj/app/.venv/bin/celery -A forj.celery worker -l debug
    command: bash -c '/home/forj/app/init.sh worker & tail -f /dev/null'

  forj-scheduler:
    volumes:
        - shared_logs_dev:$ARKA_LOGDIR
        - static_root_dev:$STATIC_ROOT
        - ./src/arka:/home/forj/app/arka/
        - ./src/templates:/home/forj/app/templates
        - ./src/static:/home/forj/app/static
        - ./src/forj:/home/forj/app/forj/
        - ./src/modular_apps:/home/forj/app/modular_apps/
    command: bash -c '/home/forj/app/init.sh beat & tail -f /dev/null'

volumes:
  pgdata_dev:
  static_root_dev:
  rabbitmq_data_dev:
  shared_logs_dev: