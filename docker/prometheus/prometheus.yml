global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus-docker"
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]