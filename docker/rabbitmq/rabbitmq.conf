# Increase heartbeat to prevent false disconnects during long tasks
heartbeat = 60

# Consumer timeout - must be longer than your longest task
# 5 hours in milliseconds
consumer_timeout = 18000000

# Connection limits
channel_max = 2047
connection_max = 1000

# Message TTL and limits
default_vhost = forj
vm_memory_high_watermark.relative = 0.6

# Management plugin
management.tcp.port = 15672

# Deprecated features: `management_metrics_collection`: Feature `management_metrics_collection` is deprecated.
deprecated_features.permit.management_metrics_collection = false