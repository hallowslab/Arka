<button id="theme-toggle" class="button is-small" style="
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 1000;
    background-color: transparent;
    border: none;
    color: inherit;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    border-radius: 50%;
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
">
    🌑
</button>

<script>
const body = document.body;
const toggle = document.getElementById('theme-toggle');

// Load theme from localStorage or default to light
let theme = localStorage.getItem('theme') || 'light';

function applyTheme(t) {
    if(t === 'dark') {
        body.classList.remove('has-background-light', 'has-text-dark');
        body.classList.add('has-background-dark', 'has-text-light');
        toggle.textContent = '🔆';
    } else {
        body.classList.remove('has-background-dark', 'has-text-light');
        body.classList.add('has-background-light', 'has-text-dark');
        toggle.textContent = '🌑';
    }
}

applyTheme(theme);

toggle.addEventListener('click', () => {
    theme = theme === 'light' ? 'dark' : 'light';
    localStorage.setItem('theme', theme);
    applyTheme(theme);
});
</script>
