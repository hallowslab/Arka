<header class="topbar">
    <button id="toggleBtn" class="button is-light is-small">☰</button>

    <div class="is-flex is-align-items-center pr-3">
        <span class="mr-3 has-text-grey">{{ request.user.username }}</span>
        <a href="{% url 'user_profile' %}">
            <figure class="image is-32x32">
                <img class="is-rounded" src="https://ui-avatars.com/api/?name={{ request.user.username }}">
            </figure>
        </a>
    </div>
</header>
