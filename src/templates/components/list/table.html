{% if items %}
<table class="table is-fullwidth is-striped is-hoverable">
    <thead>
        <tr>
            {% for column in columns %}
            <th>{{ column }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        {% include row_template %}
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="box">
    <p>{{ empty_message }}</p>
</div>
{% endif %}
