services:
  # ---------- Cache ----------
  redis:
    image: "docker.io/library/redis:latest"
    ports:
      - "6379:6379"
    restart: always
  # ---------- Broker ----------
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    container_name: rabbitmq-arka
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-forj}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  # ---------- DB ----------
  postgres:
    image: "docker.io/library/postgres:latest"
    ports:
      - "5432:5432"
    hostname: postgres-arka
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arka}
      POSTGRES_USER: ${POSTGRES_USER:-arka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - pgdata:/var/lib/postgresql
  # ---------- Arka-django ----------
  arka:
    build:
      context: .
      dockerfile: Dockerfile
      target: arka
      args:
        GROUPNAME: ${CONTAINER_GROUP:-arka}
        GID: 1002
        DJANGO_ENV: ${DJANGO_ENV}
        PYMAP_ENABLED: ${PYMAP_ENABLED}
        AERA_ENABLED: ${AERA_ENABLED}
        DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
        STATIC_ROOT: ${STATIC_ROOT}
        ARKA_LOGDIR: ${ARKA_LOGDIR}
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    volumes:
      - shared_logs:$ARKA_LOGDIR
      - static_root:$STATIC_ROOT
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: bash -c '/home/arka/app/init.sh'
  # ---------- Nginx ----------
  arka.internal:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
      args:
        GID: 1002
        GROUPNAME: ${CONTAINER_GROUP:-arka}
    ports:
      - "5001:80"
      - "5000:443"
    environment:
      STATIC_ROOT: ${STATIC_ROOT}
    volumes:
      - ./docker/templates:/etc/nginx/templates
      - static_root:/var/www/static:ro
    depends_on:
      - arka
  # ---------- Forj-celery ----------
  forj: &forj_base
    build:
      context: .
      dockerfile: Dockerfile
      target: forj-worker
      args:
        GROUPNAME: ${CONTAINER_GROUP:-arka}
        GID: 1002
        DJANGO_ENV: ${DJANGO_ENV}
        PYMAP_ENABLED: ${PYMAP_ENABLED}
        AERA_ENABLED: ${AERA_ENABLED}
        DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
        STATIC_ROOT: ${STATIC_ROOT}
        ARKA_LOGDIR: ${ARKA_LOGDIR}
    depends_on:
      - rabbitmq
    volumes:
      - shared_logs:$ARKA_LOGDIR
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    deploy:
      mode: replicated
      replicas: ${WORKER_REPLICAS:-1}
    command: bash -c '/home/forj/app/init.sh worker'
  # ---------- Forj-beat ----------
  forj-scheduler:
    <<: *forj_base
    deploy:
      mode: global
    depends_on:
      - forj
    volumes:
      - shared_logs:$ARKA_LOGDIR
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: bash -c '/home/forj/app/init.sh beat'

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - monitor
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@arka.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-PGAdmin}
    ports:
      - 9001:80
  rinsight:
    image: redislabs/redisinsight:latest
    profiles:
      - monitor
    restart: always
    ports:
      - 5540:5540

volumes:
  pgdata:
  static_root:
  rabbitmq_data:
  shared_logs:
