services:
  # ---------- Cache ----------
  redis:
    image: "docker.io/library/redis:latest"
    command: redis-server /run/secrets/redis.conf
    expose:
      - "6379"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
  # ---------- Broker ----------
  rabbitmq:
    build:
      context: .
      dockerfile: docker/rabbitmq/Dockerfile
    image: rabbitmq:arka-prod
    container_name: rabbitmq-arka
    hostname: rabbitmq
    expose:
      - "5672"
      - "15692"
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-forj}
      RABBITMQ_DISK_FREE_LIMIT: 2GB
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
  # ---------- DB ----------
  postgres:
    image: "docker.io/library/postgres:latest"
    expose:
      - "5432"
    restart: unless-stopped
    hostname: postgres-arka
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${POSTGRES_DB:-arka}
      POSTGRES_USER: ${POSTGRES_USER:-arka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arka} -d ${POSTGRES_DB:-arka}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
  # ---------- DB Pooling -----------
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: pgbouncer-arka
    environment:
      - DATABASES_HOST=${POSTGRES_HOST:-postgres}
      - DATABASES_PORT=${POSTGRES_PORT:-5432}
      - DATABASES_USER=${POSTGRES_USER}
      - DATABASES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASES_DBNAME=${POSTGRES_DB}
      - PGBOUNCER_POOL_MODE=transaction # CRITICAL for Django
      - PGBOUNCER_MAX_CLIENT_CONN=100
      - PGBOUNCER_DEFAULT_POOL_SIZE=25
    expose:
      - "6432"
    restart: unless-stopped
    depends_on:
      - postgres
  # ---------- Nginx ----------
  arka.internal:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
      args:
        GID: 10002
        GROUPNAME: ${CONTAINER_GROUP:-arka}
    ports:
      - "5001:80"
      - "5000:443"
    restart: unless-stopped
    environment:
      STATIC_ROOT: ${STATIC_ROOT}
    volumes:
      - ./docker/templates:/etc/nginx/templates
      - static_root:/var/www/static:ro
    depends_on:
      - arka
  # ---------- Arka-django ----------
  arka:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-production
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
    env_file:
      - mimir.env
      - pymap.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-arka}
      - POSTGRES_USER=${POSTGRES_USER:-arka}
      - POSTGRES_HOST=pgbouncer-arka
      - POSTGRES_PORT=6432
      - DJANGO_ENV=${DJANGO_ENV:-production}
      - STATIC_ROOT=${STATIC_ROOT}
      - ARKA_LOGDIR=${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-arka.settings}
      - CONTAINER_USER=arka
      - PYTHONPATH=/app/src
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - shared_logs:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - static_root:$STATIC_ROOT
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: /app/scripts/django_init.sh
  # ---------- Forj-celery ----------
  forj: &forj_base
    init: true
    stop_grace_period: 5m
    build:
      context: .
      dockerfile: Dockerfile
      target: final-production-worker
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
        CELERY_POOL: ${CELERY_POOL:-prefork}
    env_file:
      - mimir.env
      - pymap.env
    environment:
      - DJANGO_ENV=${DJANGO_ENV:-production}
      - CELERY_POOL=${CELERY_POOL:-prefork}
      - ARKA_LOGDIR=${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-arka.settings}
      - CONTAINER_USER=forj
      - PYTHONPATH=/app/src
    depends_on:
      - rabbitmq
    volumes:
      - shared_logs:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    deploy:
      mode: replicated
      replicas: ${WORKER_REPLICAS:-1}
    command: /app/scripts/celery_init.sh worker
  # ---------- Forj-imapsync (dedicated imapsync queue) ----------
  forj-imapsync:
    <<: *forj_base
    build:
      context: .
      dockerfile: Dockerfile
      target: final-production-imapsync-worker
      args:
        ENABLED_APPS: ${ENABLED_APPS:-""}
        MODULE_SOURCE: ${MODULE_SOURCE:-git}
        CELERY_POOL: ${CELERY_POOL:-prefork}
    deploy:
      mode: replicated
      replicas: ${IMAPSYNC_WORKER_REPLICAS:-1}
    command: /app/scripts/celery_init.sh worker imapsync
  # ---------- Forj-beat ----------
  forj-scheduler:
    <<: *forj_base
    deploy:
      mode: global
    depends_on:
      - forj
    volumes:
      - shared_logs:${ARKA_LOGDIR:-/app/ARKA_LOGS}
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    command: /app/scripts/celery_init.sh beat

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-arka}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arka}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - monitor

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://arka.internal/nginx_status
    depends_on:
      - arka.internal
    profiles:
      - monitor

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-arka
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitor

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-arka
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml
    profiles:
      - monitor
      - dashboard

  dovecotsource:
    image: hallowtechlab/dovecot:debian-trixie
    container_name: dovecotsource
    expose:
      - "143"
    volumes:
      - ./docker/dovecot/users.csv:/users.csv:ro
    environment:
      POPULATE_INBOX: "true"
      MIN_MESSAGES: "2500"
      MAX_MESSAGES: "3500"
    profiles:
      - dovecot

  dovecotdest:
    image: hallowtechlab/dovecot:debian-trixie
    container_name: dovecotdest
    expose:
      - "143"
    volumes:
      - ./docker/dovecot/users.csv:/users.csv:ro
    environment:
      POPULATE_INBOX: "false"
      MIN_MESSAGES: "2500"
      MAX_MESSAGES: "3500"
    profiles:
      - dovecot

  # webmail-source:
  #   image: roundcube/roundcubemail:latest
  #   depends_on:
  #     - dovecotsource
  #   environment:
  #     ROUNDCUBEMAIL_DEFAULT_HOST: tcp://dovecotsource:143
  #     ROUNDCUBEMAIL_SMTP_SERVER: localhost
  #   ports:
  #     - "8083:80"
  #   profiles:
  #     - dovecot

  # webmail-destination:
  #   image: roundcube/roundcubemail:latest
  #   depends_on:
  #     - dovecotdest
  #   environment:
  #     ROUNDCUBEMAIL_DEFAULT_HOST: tcp://dovecotdest:143
  #     ROUNDCUBEMAIL_SMTP_SERVER: localhost
  #   ports:
  #     - "8084:80"
  #   profiles:
  #     - dovecot

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@arka.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-PGAdmin}
    ports:
      - 9001:80
    profiles:
      - tools
  rinsight:
    image: redislabs/redisinsight:latest
    restart: always
    ports:
      - 5540:5540
    profiles:
      - tools

volumes:
  pgdata:
  static_root:
  rabbitmq_data:
  shared_logs:
  grafana_data:
